<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>精卫堂 · 考研精力管理助手</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            background: linear-gradient(145deg, #e9f0f5 0%, #d9e3ec 100%);
            font-family: 'Segoe UI', 'Roboto', 'Noto Sans', system-ui, -apple-system, 'Helvetica Neue', sans-serif;
            padding: 20px;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        /* 主卡片 */
        .dashboard {
            max-width: 580px;
            width: 100%;
            margin: 20px auto;
            background: rgba(255, 255, 255, 0.96);
            backdrop-filter: blur(2px);
            border-radius: 48px;
            box-shadow: 0 25px 45px -12px rgba(0, 0, 0, 0.25), 0 1px 2px rgba(0, 0, 0, 0.05);
            overflow: hidden;
            transition: all 0.2s ease;
        }

        /* 头部 */
        .header {
            padding: 28px 28px 12px 28px;
            background: white;
            border-bottom: 1px solid #eef2f8;
        }

        .title {
            font-size: 1.9rem;
            font-weight: 700;
            background: linear-gradient(135deg, #2b5f8a, #3c8db5);
            background-clip: text;
            -webkit-background-clip: text;
            color: transparent;
            letter-spacing: -0.3px;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .title span {
            font-size: 2rem;
        }

        .sub {
            color: #5f7f9e;
            font-size: 0.85rem;
            margin-top: 8px;
            font-weight: 500;
            border-left: 3px solid #6ab0d6;
            padding-left: 12px;
        }

        /* 番茄钟区域 */
        .timer-section {
            background: #ffffff;
            padding: 20px 24px 24px 24px;
            border-bottom: 1px solid #eef2f8;
        }

        .mode-buttons {
            display: flex;
            gap: 16px;
            justify-content: center;
            margin-bottom: 24px;
        }

        .mode-btn {
            background: #f0f4f9;
            border: none;
            padding: 10px 20px;
            border-radius: 60px;
            font-size: 1rem;
            font-weight: 600;
            color: #3f5e7c;
            cursor: pointer;
            transition: 0.2s;
            font-family: inherit;
            backdrop-filter: blur(4px);
        }

        .mode-btn.active {
            background: #2d6a8f;
            color: white;
            box-shadow: 0 6px 12px -8px rgba(45, 106, 143, 0.4);
        }

        .timer-clock {
            text-align: center;
            margin-bottom: 20px;
        }

        .time-display {
            font-size: 4.8rem;
            font-weight: 800;
            font-family: 'JetBrains Mono', monospace;
            letter-spacing: 6px;
            color: #1c3e55;
            background: #f6fafd;
            display: inline-block;
            padding: 8px 24px;
            border-radius: 80px;
            box-shadow: inset 0 1px 3px #0001, 0 4px 8px #0001;
        }

        .timer-controls {
            display: flex;
            justify-content: center;
            gap: 20px;
            margin-top: 12px;
        }

        .ctrl-btn {
            background: #eef3fc;
            border: none;
            padding: 10px 24px;
            border-radius: 40px;
            font-weight: 600;
            font-size: 0.9rem;
            cursor: pointer;
            transition: 0.15s;
            color: #1e4e6e;
            display: inline-flex;
            align-items: center;
            gap: 6px;
            box-shadow: 0 1px 2px rgba(0,0,0,0.05);
        }

        .ctrl-btn:active {
            transform: scale(0.96);
            background: #e2eaf3;
        }

        /* 精力自评 */
        .energy-section {
            padding: 20px 28px;
            background: #ffffff;
            border-bottom: 1px solid #eef2f8;
        }

        .section-title {
            font-weight: 700;
            font-size: 1.3rem;
            color: #1f4e6e;
            margin-bottom: 16px;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .energy-slider {
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        input#energyLevel {
            width: 100%;
            accent-color: #59a5cf;
            height: 6px;
            border-radius: 10px;
        }

        .energy-value {
            display: flex;
            justify-content: space-between;
            font-size: 0.8rem;
            color: #4a6f8f;
        }

        .advice-card {
            background: #f0f7fe;
            border-radius: 28px;
            padding: 18px 20px;
            margin-top: 20px;
            border-left: 6px solid #5d9bc3;
        }

        .advice-text {
            font-size: 1rem;
            line-height: 1.4;
            color: #1e4460;
            font-weight: 500;
        }

        .quick-actions {
            display: flex;
            flex-wrap: wrap;
            gap: 12px;
            margin-top: 16px;
        }

        .quick-btn {
            background: white;
            border: 1px solid #cde1ef;
            padding: 8px 16px;
            border-radius: 40px;
            font-size: 0.8rem;
            font-weight: 500;
            cursor: pointer;
            transition: 0.1s;
            color: #2c6285;
        }

        .quick-btn:hover {
            background: #e7f0fa;
            border-color: #9bc0da;
        }

        /* 统计&鼓励 */
        .stats-area {
            padding: 18px 28px 24px 28px;
            background: #fafdff;
        }

        .stats-row {
            display: flex;
            justify-content: space-between;
            background: #eef3fc;
            border-radius: 32px;
            padding: 14px 22px;
            margin-bottom: 16px;
        }

        .stat-item {
            text-align: center;
        }

        .stat-number {
            font-size: 1.8rem;
            font-weight: 800;
            color: #226089;
            line-height: 1;
        }

        .stat-label {
            font-size: 0.7rem;
            color: #5f7992;
            letter-spacing: 0.3px;
        }

        .reset-stats {
            background: none;
            border: none;
            color: #8aaec9;
            font-size: 0.7rem;
            cursor: pointer;
            text-decoration: underline;
            margin-top: 4px;
        }

        .quote {
            text-align: center;
            font-size: 0.85rem;
            color: #477196;
            margin-top: 12px;
            font-style: italic;
            border-top: 1px dashed #c8daea;
            padding-top: 16px;
        }

        footer {
            font-size: 0.7rem;
            text-align: center;
            padding: 16px 20px 22px;
            color: #7f99b0;
            background: white;
        }

        button {
            font-family: inherit;
        }
    </style>
</head>
<body>
<div class="dashboard">
    <div class="header">
        <div class="title">
            <span>⚡🧠</span> 精卫堂 · 精力舱
        </div>
        <div class="sub">科学充能 · 告别强撑 · 让每一分钟更清醒</div>
    </div>

    <!-- 番茄钟模块 -->
    <div class="timer-section">
        <div class="mode-buttons">
            <button class="mode-btn active" data-mode="pomodoro">📘 专注学习</button>
            <button class="mode-btn" data-mode="shortBreak">🌿 短休</button>
        </div>
        <div class="timer-clock">
            <div class="time-display" id="timerDisplay">25:00</div>
        </div>
        <div class="timer-controls">
            <button class="ctrl-btn" id="startBtn">▶ 开始</button>
            <button class="ctrl-btn" id="pauseBtn">⏸ 暂停</button>
            <button class="ctrl-btn" id="resetBtn">🔄 重置</button>
        </div>
    </div>

    <!-- 精力管理核心区 -->
    <div class="energy-section">
        <div class="section-title">🔋 当前精力值 <span style="font-size:0.9rem;">(拖拽调节)</span></div>
        <div class="energy-slider">
            <input type="range" id="energyLevel" min="0" max="10" value="5" step="1">
            <div class="energy-value">
                <span>😴 疲惫枯竭</span>
                <span>😐 一般</span>
                <span>⚡ 满电爆发</span>
            </div>
        </div>
        <div class="advice-card" id="adviceCard">
            <div class="advice-text" id="smartAdvice">✨ 拖动滑块，获取专属精力恢复建议 ✨</div>
            <div class="quick-actions" id="quickActionPanel">
                <!-- 动态推荐按钮 -->
            </div>
        </div>
    </div>

    <!-- 数据统计 + 鼓励 -->
    <div class="stats-area">
        <div class="stats-row">
            <div class="stat-item">
                <div class="stat-number" id="tomatoCount">0</div>
                <div class="stat-label">今日🍅番茄数</div>
            </div>
            <div class="stat-item">
                <div class="stat-number" id="focusMins">0</div>
                <div class="stat-label">专注分钟</div>
            </div>
            <div class="stat-item">
                <div class="stat-number" id="restAdviceTip">✨</div>
                <div class="stat-label">即时状态</div>
            </div>
        </div>
        <button class="reset-stats" id="resetStatsBtn">🧹 重置今日数据</button>
        <div class="quote" id="motivationQuote">🌙 “休息不是懒惰，是为了跑得更远” — 今天你已经很优秀了</div>
    </div>
    <footer>🎓 考研精力助手 | 番茄专注 + 动态恢复建议 | 累了就休息5分钟，效率翻倍</footer>
</div>

<script>
    // ---------- 番茄钟逻辑 ----------
    let timerInterval = null;
    let currentMode = "pomodoro";   // pomodoro / shortBreak
    let timeLeftSeconds = 25 * 60;   // 默认 25分钟
    let isRunning = false;

    // 预设时间 (秒)
    const MODE_TIME = {
        pomodoro: 25 * 60,
        shortBreak: 5 * 60
    };

    // DOM 元素
    const timerDisplayEl = document.getElementById("timerDisplay");
    const startBtn = document.getElementById("startBtn");
    const pauseBtn = document.getElementById("pauseBtn");
    const resetBtn = document.getElementById("resetBtn");
    const modeBtns = document.querySelectorAll(".mode-btn");

    // 更新显示时间
    function updateTimerDisplay() {
        const mins = Math.floor(timeLeftSeconds / 60);
        const secs = timeLeftSeconds % 60;
        timerDisplayEl.textContent = `${mins.toString().padStart(2, '0')}:${secs.toString().padStart(2, '0')}`;
        // 动态修改标题提醒 (可选)
        if (isRunning) {
            document.title = `⏰ ${timerDisplayEl.textContent} - 精卫堂`;
        } else {
            document.title = `精卫堂 · 精力助手`;
        }
    }

    // 切换模式时重置计时器并停止
    function switchMode(mode) {
        if (isRunning) {
            clearInterval(timerInterval);
            isRunning = false;
        }
        currentMode = mode;
        timeLeftSeconds = MODE_TIME[currentMode];
        updateTimerDisplay();

        // 更新按钮样式
        modeBtns.forEach(btn => {
            if (btn.getAttribute("data-mode") === currentMode) {
                btn.classList.add("active");
            } else {
                btn.classList.remove("active");
            }
        });
    }

    // 开始倒计时
    function startTimer() {
        if (isRunning) return;
        if (timeLeftSeconds <= 0) {
            // 如果已经是0，重置当前模式时间
            timeLeftSeconds = MODE_TIME[currentMode];
            updateTimerDisplay();
        }
        isRunning = true;
        timerInterval = setInterval(() => {
            if (timeLeftSeconds <= 1) {
                // 倒计时结束，触发完成事件
                clearInterval(timerInterval);
                isRunning = false;
                // 提醒用户
                if (Notification.permission === "granted") {
                    const modeName = currentMode === "pomodoro" ? "专注学习" : "休息";
                    new Notification("🍅 精卫堂提醒", { body: `${modeName} 时间结束！快调整状态～`, icon: "📚" });
                } else if (Notification.permission !== "denied") {
                    Notification.requestPermission().then(perm => {
                        if (perm === "granted") {
                            const modeName = currentMode === "pomodoro" ? "专注学习" : "休息";
                            new Notification("🍅 精卫堂提醒", { body: `${modeName}时间结束！`, icon: "🎯" });
                        } else {
                            alert(`⏰ ${currentMode === "pomodoro" ? "专注时段结束" : "休息结束"}！记得调整精力~`);
                        }
                    });
                } else {
                    alert(`⏰ ${currentMode === "pomodoro" ? "专注学习结束！好棒！休息一下吧" : "小憩结束，继续加油~"}`);
                }
                // 如果是专注学习结束时，增加番茄数 & 专注分钟
                if (currentMode === "pomodoro") {
                    addCompletedPomodoro();
                }
                // 结束倒计时自动重置当前模式时间 (不切换模式，保持同模式但重置倒计时)
                timeLeftSeconds = MODE_TIME[currentMode];
                updateTimerDisplay();
                // 播放提示效果（简单震动/无声音）
            } else {
                timeLeftSeconds--;
                updateTimerDisplay();
            }
        }, 1000);
    }

    function pauseTimer() {
        if (timerInterval) {
            clearInterval(timerInterval);
            isRunning = false;
        }
    }

    function resetTimer() {
        pauseTimer();
        timeLeftSeconds = MODE_TIME[currentMode];
        updateTimerDisplay();
    }

    // 番茄统计 (localStorage)
    let todayTomatoCount = 0;
    let totalFocusMins = 0;
    const STORAGE_KEY = "EnergyPilot_Stats";
    
    function loadStats() {
        const stored = localStorage.getItem(STORAGE_KEY);
        if (stored) {
            try {
                const data = JSON.parse(stored);
                const savedDate = data.date;
                const todayStr = new Date().toDateString();
                if (savedDate === todayStr) {
                    todayTomatoCount = data.tomatoCount || 0;
                    totalFocusMins = data.focusMins || 0;
                } else {
                    // 新的一天重置
                    todayTomatoCount = 0;
                    totalFocusMins = 0;
                    saveStats();
                }
            } catch(e) { resetStatsToZero(); }
        } else {
            resetStatsToZero();
        }
        updateStatsUI();
    }

    function resetStatsToZero() {
        todayTomatoCount = 0;
        totalFocusMins = 0;
        saveStats();
    }

    function saveStats() {
        const todayStr = new Date().toDateString();
        const data = {
            date: todayStr,
            tomatoCount: todayTomatoCount,
            focusMins: totalFocusMins
        };
        localStorage.setItem(STORAGE_KEY, JSON.stringify(data));
    }

    function addCompletedPomodoro() {
        // 每完成一次学习番茄 (25分钟)
        todayTomatoCount++;
        totalFocusMins += 25;
        saveStats();
        updateStatsUI();
        // 额外激励引用变化
        updateMotivationalQuoteByEnergy();
    }

    function updateStatsUI() {
        document.getElementById("tomatoCount").innerText = todayTomatoCount;
        document.getElementById("focusMins").innerText = totalFocusMins;
    }

    // 重置统计数据按钮
    document.getElementById("resetStatsBtn").addEventListener("click", () => {
        if (confirm("重置今日番茄数和专注分钟？不会影响你的能力，只是数据清零~")) {
            resetStatsToZero();
            updateStatsUI();
            showTemporaryAdvice("🧹 数据已重置，新的开始，加油！");
        }
    });

    // 精力滑块联动 + 智能建议 + 快速操作按钮
    const energySlider = document.getElementById("energyLevel");
    const adviceTextSpan = document.getElementById("smartAdvice");
    const quickPanel = document.getElementById("quickActionPanel");
    
    // 根据精力值获取建议文本和推荐操作 (0~10)
    function getEnergyAdvice(energy) {
        if (energy <= 2) {
            return {
                text: "⚠️ 极度疲劳！大脑已超负荷。别强行学习了，立即休息20分钟或小睡一会儿。",
                actions: ["💤 闭眼深呼吸5分钟", "🚰 喝一大杯温水", "🧊 冷水洗脸", "🌙 暂时趴桌小睡15分钟"]
            };
        } else if (energy <= 4) {
            return {
                text: "😟 精力明显不足，效率极低。来个快速充能：轻量活动+短休。",
                actions: ["🧘 肩颈拉伸2分钟", "🚶 走动3分钟", "🥤 饮用半杯电解质水", "🎧 听1首纯音乐"]
            };
        } else if (energy <= 6) {
            return {
                text: "😐 状态普通，容易走神。建议番茄工作法 + 5分钟冥想唤醒。",
                actions: ["🍅 开启一个番茄钟（帮你聚焦）", "🧠 闭眼回忆今日笔记", "💧 眼部按摩", "📋 写下3件优先任务"]
            };
        } else if (energy <= 8) {
            return {
                text: "👍 精力尚可，适合中等难度任务。保持节奏，避免久坐。",
                actions: ["📌 做10道选择题", "✍️ 画一张思维导图", "💪 站立学习或拉伸", "🍎 吃个小水果"]
            };
        } else {
            return {
                text: "⚡⚡ 满电爆发！把握黄金时刻，攻克最难的科目！但要警惕过耗，每50分钟休息一下。",
                actions: ["🚀 攻克线代大题", "📈 刷一套真题", "🎯 挑战高难度概念", "🌿 提醒：别忘喝水"]
            };
        }
    }
    
    function updateAdviceByEnergy() {
        const val = parseInt(energySlider.value, 10);
        const advice = getEnergyAdvice(val);
        adviceTextSpan.innerHTML = `💡 ${advice.text}`;
        // 动态渲染按钮
        quickPanel.innerHTML = "";
        advice.actions.forEach(action => {
            const btn = document.createElement("button");
            btn.className = "quick-btn";
            btn.innerText = action;
            btn.addEventListener("click", () => {
                // 点击执行行为: 如果是启动番茄钟或拉伸的提示
                if (action.includes("番茄钟") || action.includes("开启一个番茄钟")) {
                    if (currentMode !== "pomodoro") switchMode("pomodoro");
                    if (!isRunning) startTimer();
                    showTemporaryAdvice("🍅 番茄钟已启动！专注25分钟，之后会自动休息~");
                } 
                else if (action.includes("闭眼深呼吸") || action.includes("拉伸") || action.includes("走动") || action.includes("洗脸") || action.includes("喝水")) {
                    showTemporaryAdvice(`✅ 好习惯：${action} 能快速提升大脑供血，坚持几秒钟！`);
                    // 模拟简单计时提醒
                    if (action.includes("拉伸")) {
                        setTimeout(() => showTemporaryAdvice("👍 拉伸完成！身体放松了些吧？继续加油~"), 3000);
                    }
                } 
                else if (action.includes("小睡")) {
                    showTemporaryAdvice("😴 设定15分钟闹钟，小睡后重启大脑！注意别着凉");
                    // 可选自动开启休息模式
                    if (currentMode !== "shortBreak") switchMode("shortBreak");
                    if (!isRunning) startTimer();
                }
                else if (action.includes("站立")) {
                    showTemporaryAdvice("🧍 站起来学习效率+15%，试试看～");
                }
                else {
                    showTemporaryAdvice(`✨ 执行「${action}」: 专注当下状态会改善！`);
                }
                // 额外提升精力值模拟鼓励？不需要自动改变滑块，人手动调整更真实
            });
            quickPanel.appendChild(btn);
        });
        // 更新更精细的状态指示小圆点
        const stateSpan = document.getElementById("restAdviceTip");
        if (val <= 3) stateSpan.innerHTML = "🆘 急需休息";
        else if (val <= 5) stateSpan.innerHTML = "🌿 适当调节";
        else if (val <= 7) stateSpan.innerHTML = "📖 保持节奏";
        else stateSpan.innerHTML = "⚡ 峰值状态";
        
        // 额外动态改变鼓励语
        updateMotivationalQuoteByEnergy(val);
    }
    
    function showTemporaryAdvice(msg) {
        const original = adviceTextSpan.innerHTML;
        adviceTextSpan.innerHTML = `✨ ${msg}`;
        setTimeout(() => {
            const currentVal = parseInt(energySlider.value, 10);
            const freshAdvice = getEnergyAdvice(currentVal);
            adviceTextSpan.innerHTML = `💡 ${freshAdvice.text}`;
        }, 2500);
    }
    
    function updateMotivationalQuoteByEnergy(energy = null) {
        let val = (energy !== null) ? energy : parseInt(energySlider.value, 10);
        const quoteEl = document.getElementById("motivationQuote");
        const quotes = [
            "🌱 “学累了就休息，清醒比时长更重要” — 你已经很棒了",
            "💪 大脑不是机器，休息是最好的学习策略",
            "🧘 花费5分钟调整呼吸，效率提升30%",
            "🍃 现在的疲惫是进步的阶梯，但适时停靠才能登顶",
            "🌟 专注即力量，休息即续航，两者缺一不可",
            "📖 晚上22点后，睡眠是最高效的投资",
            "🎯 你今天的专注时长已累积 " + totalFocusMins + " 分钟，为自己骄傲！"
        ];
        if (val <= 3) {
            quoteEl.innerHTML = "🛌 别硬撑了，立即休息，明天才能继续战斗。你已经尽力了，考研是马拉松。";
        } else if (val <= 5) {
            quoteEl.innerHTML = "🌙 “中场休息不是放弃，是战术调整” 试试闭眼深呼吸2分钟。";
        } else {
            let idx = Math.floor(Math.random() * quotes.length);
            let custom = quotes[idx];
            if (custom.includes("专注时长")) custom = custom.replace("##", totalFocusMins);
            quoteEl.innerHTML = custom;
        }
    }
    
    // 滑块事件绑定
    energySlider.addEventListener("input", (e) => {
        updateAdviceByEnergy();
    });
    
    // 初始化页面
    function init() {
        loadStats();
        switchMode("pomodoro");
        updateAdviceByEnergy();
        // 请求通知权限（温和）
        if ("Notification" in window && Notification.permission !== "denied" && Notification.permission !== "granted") {
            Notification.requestPermission();
        }
        // 如果当前时间晚于21点温和提示
        const hour = new Date().getHours();
        if (hour >= 21 || hour <= 5) {
            setTimeout(() => {
                if(confirm("🌙 现在已经较晚，建议开启「短休」模式或准备入睡，精力管理比熬夜苦读更重要。点击确定继续使用，取消关闭提醒")){
                    // 什么也不做
                }
            }, 1000);
        }
    }
    
    // 绑定按钮事件
    startBtn.addEventListener("click", startTimer);
    pauseBtn.addEventListener("click", pauseTimer);
    resetBtn.addEventListener("click", resetTimer);
    
    modeBtns.forEach(btn => {
        btn.addEventListener("click", (e) => {
            const mode = e.currentTarget.getAttribute("data-mode");
            if (mode === "pomodoro") {
                switchMode("pomodoro");
            } else if (mode === "shortBreak") {
                switchMode("shortBreak");
            }
            // 切换模式后如果原来再跑就停，且重置倒计时显示已经完成
            if(isRunning) pauseTimer();
            resetTimer();
        });
    });
    
    // 监听页面关闭前保存一次数据（自动保存实时）
    window.addEventListener("beforeunload", () => {
        saveStats();
    });
    
    // 更新统计数据UI同步
    function syncFromStorage() {
        loadStats();
    }
    // 每次番茄计数后已经调用saveStats, 再统一更新
    init();
</script>
</body>
</html>
