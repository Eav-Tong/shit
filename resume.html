<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>个人简历 - 互动版</title>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@300;400;500;700&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --primary: #2d3436;
            --secondary: #636e72;
            --accent: #0984e3;
            --bg: #f8f9fa;
            --card-bg: #ffffff;
            --border: #e9ecef;
            --shadow: 0 4px 20px rgba(0,0,0,0.08);
        }

        body {
            font-family: 'Noto Sans SC', sans-serif;
            background: var(--bg);
            min-height: 100vh;
            color: var(--primary);
            line-height: 1.6;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 40px 20px;
        }

        header {
            text-align: center;
            margin-bottom: 40px;
        }

        .avatar {
            width: 120px;
            height: 120px;
            border-radius: 50%;
            background: linear-gradient(135deg, var(--accent), #74b9ff);
            margin: 0 auto 20px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 48px;
            color: white;
            font-weight: 300;
        }

        h1 {
            font-size: 28px;
            font-weight: 500;
            margin-bottom: 8px;
        }

        .subtitle {
            color: var(--secondary);
            font-size: 16px;
        }

        .main-content {
            display: grid;
            grid-template-columns: 1fr 1.5fr;
            gap: 30px;
            max-width: 1000px;
            margin: 0 auto;
        }

        .profile-card {
            background: var(--card-bg);
            border-radius: 16px;
            padding: 30px;
            box-shadow: var(--shadow);
            height: fit-content;
        }

        .profile-card h2 {
            font-size: 18px;
            font-weight: 500;
            margin-bottom: 20px;
            padding-bottom: 15px;
            border-bottom: 1px solid var(--border);
        }

        .info-item {
            display: flex;
            align-items: center;
            margin-bottom: 15px;
            font-size: 14px;
        }

        .info-icon {
            width: 36px;
            height: 36px;
            background: var(--bg);
            border-radius: 10px;
            display: flex;
            align-items: center;
            justify-content: center;
            margin-right: 12px;
            font-size: 16px;
        }

        .chat-container {
            background: var(--card-bg);
            border-radius: 16px;
            box-shadow: var(--shadow);
            display: flex;
            flex-direction: column;
            height: 500px;
        }

        .chat-header {
            padding: 20px 25px;
            border-bottom: 1px solid var(--border);
        }

        .chat-header h2 {
            font-size: 16px;
            font-weight: 500;
        }

        .chat-header p {
            font-size: 13px;
            color: var(--secondary);
            margin-top: 4px;
        }

        .chat-messages {
            flex: 1;
            overflow-y: auto;
            padding: 20px 25px;
            display: flex;
            flex-direction: column;
            gap: 15px;
        }

        .message {
            max-width: 80%;
            padding: 12px 16px;
            border-radius: 16px;
            font-size: 14px;
            line-height: 1.5;
            animation: fadeIn 0.3s ease;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .message.bot {
            background: var(--bg);
            align-self: flex-start;
            border-bottom-left-radius: 4px;
        }

        .message.user {
            background: var(--accent);
            color: white;
            align-self: flex-end;
            border-bottom-right-radius: 4px;
        }

        .chat-input-area {
            padding: 20px 25px;
            border-top: 1px solid var(--border);
            display: flex;
            gap: 12px;
        }

        .chat-input {
            flex: 1;
            padding: 14px 18px;
            border: 2px solid var(--border);
            border-radius: 12px;
            font-size: 14px;
            font-family: inherit;
            outline: none;
            transition: border-color 0.2s;
        }

        .chat-input:focus {
            border-color: var(--accent);
        }

        .send-btn {
            padding: 14px 24px;
            background: var(--accent);
            color: white;
            border: none;
            border-radius: 12px;
            font-size: 14px;
            font-weight: 500;
            cursor: pointer;
            transition: background 0.2s, transform 0.1s;
        }

        .send-btn:hover {
            background: #0773c7;
        }

        .send-btn:active {
            transform: scale(0.98);
        }

        .suggestions {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
            margin-top: 10px;
        }

        .suggestion-btn {
            padding: 8px 14px;
            background: var(--bg);
            border: 1px solid var(--border);
            border-radius: 20px;
            font-size: 13px;
            cursor: pointer;
            transition: all 0.2s;
        }

        .suggestion-btn:hover {
            background: var(--accent);
            color: white;
            border-color: var(--accent);
        }

        @media (max-width: 768px) {
            .main-content {
                grid-template-columns: 1fr;
            }
            
            .container {
                padding: 20px 15px;
            }
            
            .chat-container {
                height: 450px;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <div class="avatar">李</div>
            <h1>李明</h1>
            <p class="subtitle">全栈工程师 · 5年经验</p>
        </header>

        <div class="main-content">
            <div class="profile-card">
                <h2>基本信息</h2>
                <div class="info-item">
                    <div class="info-icon">📧</div>
                    <span>liming@example.com</span>
                </div>
                <div class="info-item">
                    <div class="info-icon">📱</div>
                    <span>138-0000-0000</span>
                </div>
                <div class="info-item">
                    <div class="info-icon">📍</div>
                    <span>北京市朝阳区</span>
                </div>
                <div class="info-item">
                    <div class="info-icon">🎯</div>
                    <span>前端开发 / 全栈</span>
                </div>
            </div>

            <div class="chat-container">
                <div class="chat-header">
                    <h2>💬 了解我的经历</h2>
                    <p>点击下方问题或直接输入你想了解的内容</p>
                </div>
                <div class="chat-messages" id="chatMessages">
                    <div class="message bot">
                        你好！我是李明，欢迎你来访。😊<br><br>
                        你可以问我关于我的：<br>
                        • 工作经历<br>
                        • 技能专长<br>
                        • 项目经验<br>
                        • 教育背景<br>
                        • 联系方式<br><br>
                        请选择一个话题或直接提问~
                    </div>
                </div>
                <div class="chat-input-area">
                    <input type="text" class="chat-input" id="userInput" placeholder="输入你的问题..." onkeypress="handleKeyPress(event)">
                    <button class="send-btn" onclick="sendMessage()">发送</button>
                </div>
            </div>
        </div>
    </div>

    <script>
        const qaData = [
            { keywords: ['工作', '经历', '经验', '职业'], answer: '我的工作经历：\n\n• 2021-至今：某互联网公司 - 高级前端工程师\n  负责核心产品前端架构设计与团队管理\n\n• 2019-2021：科技创业公司 - 全栈工程师\n  从0到1搭建多个SaaS产品\n\n• 2017-2019：传统企业 - Java开发工程师\n  企业内部管理系统开发' },
            { keywords: ['技能', '技术', '专长', '擅长'], answer: '我的技术栈：\n\n🛠 熟练掌握\n• 前端：Vue3、React、TypeScript\n• 后端：Node.js、Python\n• 数据库：MySQL、MongoDB\n\n📚 了解\n• 微服务架构、DevOps\n• 性能优化、安全防护\n\n💡 其他\n• 良好的代码规范意识\n• 敏捷开发经验' },
            { keywords: ['项目', '作品', '做过'], answer: '主要项目经验：\n\n1️⃣ 电商平台重构\n   主导前端架构升级，提升页面加载速度60%\n\n2️⃣ 企业后台管理系统\n   从0到1搭建，支持1000+用户并发\n\n3️⃣ 实时协作工具\n   实现WebSocket多人实时编辑\n\n4️⃣ 移动端H5应用\n   累计百万级用户访问' },
            { keywords: ['教育', '学历', '毕业', '学校', '大学'], answer: '教育背景：\n\n🎓 北京大学 - 软件工程 - 硕士\n   2015-2017\n\n🎓 北京航空航天大学 - 计算机科学与技术 - 本科\n   2011-2015\n\n在校期间获多次奖学金，参与多个开源项目。' },
            { keywords: ['联系', '邮箱', '电话', '微信', '加'], answer: '联系方式：\n\n📧 邮箱：liming@example.com\n📱 电话：138-0000-0000\n💬 微信：liming_dev\n\n欢迎随时联系我！或在右侧输入框留下你的联系方式~' },
            { keywords: ['你好', '您好', '嗨', 'hi', 'hello'], answer: '你好！很高兴见到你！👋\n\n有什么想了解的吗？可以点击上方的快速问题，或直接输入你想问的内容。' },
            { keywords: ['谢谢', '感谢', '感恩'], answer: '不客气！😊很高兴能帮到你！\n\n如果还有其他问题，随时问我~' },
            { keywords: ['年龄', '多大', '生日'], answer: '我今年30岁，来自北京。\n\n如果你对我的经历或技能感兴趣，可以继续问我哦！' },
            { keywords: ['薪资', '工资', '待遇', '薪酬'], answer: '关于薪资细节，不便在此公开讨论。\n\n不过如果你有具体的招聘或合作意向，欢迎通过右侧联系方式进一步沟通，我可以根据岗位详情给你详细答复。' },
            { keywords: ['优势', '优点', '特点', '强项'], answer: '我的核心优势：\n\n✅ 5年全栈开发经验，技术全面\n✅ 主导过多个从0到1的项目\n✅ 具备团队管理经验\n✅ 注重代码质量与性能优化\n✅ 良好的沟通与协作能力' }
        ];

        const quickQuestions = [
            '工作经历',
            '技术技能',
            '项目经验',
            '教育背景',
            '联系方式'
        ];

        function findAnswer(input) {
            const lowerInput = input.toLowerCase();
            
            for (const item of qaData) {
                for (const keyword of item.keywords) {
                    if (lowerInput.includes(keyword)) {
                        return item.answer;
                    }
                }
            }
            
            return '抱歉，我不太明白你的问题。😅\n\n你可以试试这样问：\n• 我的工作经历是什么？\n• 你擅长哪些技术？\n• 做过的项目有哪些？\n• 教育背景是什么？\n• 如何联系你？';
        }

        function addMessage(text, isUser) {
            const messagesContainer = document.getElementById('chatMessages');
            const messageDiv = document.createElement('div');
            messageDiv.className = `message ${isUser ? 'user' : 'bot'}`;
            messageDiv.textContent = text;
            messagesContainer.appendChild(messageDiv);
            messagesContainer.scrollTop = messagesContainer.scrollHeight;
        }

        function sendMessage() {
            const input = document.getElementById('userInput');
            const text = input.value.trim();
            
            if (!text) return;
            
            addMessage(text, true);
            input.value = '';
            
            setTimeout(() => {
                const answer = findAnswer(text);
                addMessage(answer, false);
            }, 300 + Math.random() * 300);
        }

        function handleKeyPress(event) {
            if (event.key === 'Enter') {
                sendMessage();
            }
        }

        function askQuestion(question) {
            document.getElementById('userInput').value = question;
            sendMessage();
        }

        document.addEventListener('DOMContentLoaded', () => {
            const chatMessages = document.getElementById('chatMessages');
            const suggestionsDiv = document.createElement('div');
            suggestionsDiv.className = 'suggestions';
            
            quickQuestions.forEach(q => {
                const btn = document.createElement('button');
                btn.className = 'suggestion-btn';
                btn.textContent = q;
                btn.onclick = () => askQuestion(q);
                suggestionsDiv.appendChild(btn);
            });
            
            chatMessages.appendChild(suggestionsDiv);
        });
    </script>
</body>
</html>
